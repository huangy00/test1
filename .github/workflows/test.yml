# GitHub Actions 自动化测试配置
# 作用：每次推送代码到GitHub，自动运行测试

name: 自动化测试

# 触发条件：推送到main分支时触发
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 第1步：拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 第2步：安装Python
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 第3步：安装依赖
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium

      # 第4步：运行测试
      - name: 运行测试
        run: |
          pytest tests/ --alluredir=allure-results -v

      # 第5步：上传测试报告
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: allure-results/
